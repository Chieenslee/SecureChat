services:
  - type: web
    name: securechat-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn server.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECURE_CHAT_JWT_SECRET
        generateValue: true
